<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>BOBDO</title>
    <meta name="description" content="Bogura Online Blood Donation Organization">
    <meta name="keywords" content="Bogura Online Blood Donation Organization, Bogra, Bogura, Blood, blood donation Bogura, emergency blood Bangladesh, Bogura blood donors, BOBDO, save lives Bogura, blood bank Bangladesh">
    
    <!-- Google Verification -->
    <meta name="google-site-verification" content="A0IVSpMPJp31gNQG5Y2TinipS6zarnk0EssxWAPG5So" />
    
    <!-- Favicon (consider using a red cross or blood drop icon) -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/YCLzm8WQ/images.jpg" />
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bobdo.netlify.app">
    <meta property="og:title" content="BOBDO">
    <meta property="og:description" content="Bogura Online Blood Donation Organization">
    <meta property="og:image" content="https://i.postimg.cc/YCLzm8WQ/images.jpg">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@bobdo_bd">
    <meta name="twitter:title" content="BOBDO Blood Donation Network">
    <meta name="twitter:description" content="Connecting blood donors with patients in Bogura, Bangladesh">
    <meta name="twitter:image" content="https://i.postimg.cc/YCLzm8WQ/images.jpg">
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://bobdo.netlify.app" />
    
    <!-- Theme Color for Mobile Browsers -->
    <meta name="theme-color" content="#d32f2f">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="https://i.postimg.cc/YCLzm8WQ/images.jpg">
  </head>
  <body>
    <noscript>
      <div style="text-align: center; padding: 2rem; background: #ffebee; color: #c62828;">
        <h2>JavaScript Required</h2>
        <p>BOBDO requires JavaScript to function properly. Please enable JavaScript in your browser to use our life-saving services.</p>
        <p>For emergency blood requests, please call our helpline: [ADD HELPLINE NUMBER]</p>
      </div>
    </noscript>
    
    <div id="root"></div>
    
    <!-- Defer script loading -->
    <script type="module" src="/src/main.tsx" defer></script>
    
    <!-- Structured Data for Local Business -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NGO",
      "name": "BOBDO - Bogura Online Blood Donation Organization",
      "url": "https://bobdo.netlify.app",
      "logo": "https://i.postimg.cc/YCLzm8WQ/images.jpg",
      "description": "Emergency blood donor network serving Bogura, Bangladesh",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Bogura",
        "addressRegion": "Rajshahi",
        "addressCountry": "BD"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "[PHONE NUMBER]",
        "contactType": "Emergency blood request"
      },
      "sameAs": [
        "https://facebook.com/bobdo.bd",
        "https://twitter.com/bobdo_bd"
      ]
    }
    </script>
  </body>
</html>
